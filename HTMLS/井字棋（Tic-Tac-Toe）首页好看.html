<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Tac-Toe | 霓虹井字棋</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Custom Styles & Animations */
        body {
            font-family: 'Roboto Mono', monospace;
            background-color: #050505;
            overflow: hidden;
        }

        .font-cyber {
            font-family: 'Orbitron', sans-serif;
        }

        /* Neon Glow Effects */
        .glow-text-cyan {
            text-shadow: 0 0 5px #06b6d4, 0 0 10px #06b6d4, 0 0 20px #06b6d4;
        }
        .glow-text-pink {
            text-shadow: 0 0 5px #ec4899, 0 0 10px #ec4899, 0 0 20px #ec4899;
        }
        .glow-box-cyan {
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5), inset 0 0 10px rgba(6, 182, 212, 0.2);
            border: 1px solid #06b6d4;
        }
        .glow-box-pink {
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.5), inset 0 0 10px rgba(236, 72, 153, 0.2);
            border: 1px solid #ec4899;
        }

        /* Grid Cell Styling */
        .cell {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .cell:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.98);
        }
        .cell::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }
        .cell:hover::after {
            transform: translateX(100%);
        }

        /* Markers (X and O) */
        .marker-x {
            color: #06b6d4; /* Cyan-500 */
        }
        .marker-o {
            color: #ec4899; /* Pink-500 */
        }

        /* Winning Animation */
        @keyframes win-pulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.3); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        .winning-cell {
            animation: win-pulse 1s infinite;
            background: rgba(255, 255, 255, 0.15) !important;
        }

        /* CRT Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
            opacity: 0.6;
        }
        
        /* Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* Glitch Text Effect */
        .glitch-wrapper {
            position: relative;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -1px 0 red;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -1px 0 blue;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 30px, 0); }
            20% { clip: rect(80px, 9999px, 100px, 0); }
            40% { clip: rect(10px, 9999px, 50px, 0); }
            60% { clip: rect(40px, 9999px, 80px, 0); }
            80% { clip: rect(20px, 9999px, 60px, 0); }
            100% { clip: rect(70px, 9999px, 90px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(60px, 9999px, 80px, 0); }
            20% { clip: rect(10px, 9999px, 30px, 0); }
            40% { clip: rect(50px, 9999px, 70px, 0); }
            60% { clip: rect(20px, 9999px, 40px, 0); }
            80% { clip: rect(90px, 9999px, 100px, 0); }
            100% { clip: rect(30px, 9999px, 50px, 0); }
        }

        /* Modal Transition */
        .modal-enter { opacity: 0; transform: scale(0.9); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s ease-out; }
        .modal-exit { opacity: 1; transform: scale(1); }
        .modal-exit-active { opacity: 0; transform: scale(0.9); transition: all 0.2s ease-in; }

    </style>
</head>
<body class="text-white h-screen flex flex-col items-center justify-center selection:bg-pink-500 selection:text-white">

    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>
    
    <!-- CRT Overlay -->
    <div class="scanlines"></div>

    <!-- Start Overlay (Audio Context) -->
    <div id="start-overlay" class="fixed inset-0 z-[60] bg-black/90 flex flex-col items-center justify-center backdrop-blur-sm transition-opacity duration-500">
        <h1 class="text-6xl md:text-8xl font-cyber font-black mb-8 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500 glitch-wrapper">
            <span class="glitch" data-text="TIC-TAC-TOE">TIC-TAC-TOE</span>
        </h1>
        <button id="init-btn" class="group relative px-8 py-4 bg-transparent overflow-hidden rounded-none border-2 border-cyan-500 text-cyan-400 font-cyber font-bold text-xl hover:text-black transition-colors duration-300">
            <span class="absolute inset-0 w-full h-full bg-cyan-500/0 group-hover:bg-cyan-500 transition-all duration-300"></span>
            <span class="relative z-10 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                INITIALIZE SYSTEM
            </span>
        </button>
        <p class="mt-4 text-gray-500 text-sm animate-pulse">Click to enable audio & graphics</p>
    </div>

    <!-- Game Container -->
    <div class="relative z-10 w-full max-w-md px-4 flex flex-col gap-6">
        
        <!-- Header / Scoreboard -->
        <div class="flex justify-between items-end border-b border-gray-800 pb-4">
            <div class="flex flex-col gap-1">
                <h2 class="text-xs text-gray-500 tracking-widest">PLAYER 1</h2>
                <div class="flex items-center gap-2">
                    <span class="text-3xl font-cyber text-cyan-400 glow-text-cyan">X</span>
                    <span id="score-x" class="text-2xl font-bold">0</span>
                </div>
            </div>
            
            <div class="flex flex-col items-center">
                <div id="status-display" class="px-4 py-1 bg-gray-900/50 border border-gray-700 rounded text-xs font-bold tracking-widest text-gray-300 mb-2">
                    TURN: <span id="current-player" class="text-cyan-400">PLAYER X</span>
                </div>
                <div class="text-[10px] text-gray-600 font-mono">ROUNDS: <span id="round-count">1</span></div>
            </div>

            <div class="flex flex-col gap-1 items-end">
                <h2 class="text-xs text-gray-500 tracking-widest">PLAYER 2</h2>
                <div class="flex items-center gap-2">
                    <span id="score-o" class="text-2xl font-bold">0</span>
                    <span class="text-3xl font-cyber text-pink-500 glow-text-pink">O</span>
                </div>
            </div>
        </div>

        <!-- The Grid -->
        <div class="relative p-2 bg-gray-900/40 rounded-xl border border-gray-800 backdrop-blur-sm shadow-2xl">
            <!-- Grid Lines (Visual only) -->
            <div class="absolute inset-0 grid grid-cols-3 grid-rows-3 pointer-events-none p-4 gap-4">
                <!-- JS will populate visual grid lines if needed, but CSS borders on cells work better for responsiveness -->
            </div>

            <div id="game-grid" class="grid grid-cols-3 gap-3 w-full aspect-square">
                <!-- Cells generated by JS -->
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between items-center mt-2">
            <button id="mode-btn" class="text-xs text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                MODE: <span id="mode-text" class="text-cyan-300">2 PLAYERS</span>
            </button>

            <button id="reset-btn" class="group px-6 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 hover:border-white rounded text-sm font-bold tracking-wider transition-all active:scale-95 flex items-center gap-2">
                <svg class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                RESET
            </button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-gray-900 border border-gray-700 p-8 rounded-2xl shadow-2xl text-center transform scale-90 transition-transform duration-300 max-w-sm w-full mx-4 relative overflow-hidden">
            <!-- Decorative background blob -->
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-cyan-500 to-pink-500"></div>
            
            <h2 id="result-title" class="text-4xl font-cyber font-bold mb-2 text-white">PLAYER X WINS</h2>
            <p id="result-message" class="text-gray-400 mb-8 font-mono text-sm">DOMINATION COMPLETE</p>
            
            <div class="flex flex-col gap-3">
                <button id="play-again-btn" class="w-full py-3 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold rounded shadow-lg shadow-cyan-500/30 transition-all hover:scale-105">
                    PLAY AGAIN
                </button>
                <button id="change-mode-btn" class="w-full py-2 text-gray-500 hover:text-white text-sm transition-colors">
                    Switch Mode
                </button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Game Logic & State Management
         */
        const Game = (() => {
            // State
            let board = Array(9).fill(null);
            let currentPlayer = 'X'; // 'X' or 'O'
            let gameActive = false;
            let mode = '2P'; // '2P' or 'AI'
            let scores = { X: 0, O: 0 };
            let round = 1;
            let audioInitialized = false;

            // DOM Elements
            const gridEl = document.getElementById('game-grid');
            const statusEl = document.getElementById('current-player');
            const scoreXEl = document.getElementById('score-x');
            const scoreOEl = document.getElementById('score-o');
            const roundEl = document.getElementById('round-count');
            const modal = document.getElementById('result-modal');
            const modalContent = modal.querySelector('div');
            const resultTitle = document.getElementById('result-title');
            const resultMsg = document.getElementById('result-message');
            const modeText = document.getElementById('mode-text');

            // Winning Combinations
            const winConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
                [0, 4, 8], [2, 4, 6]             // Diagonals
            ];

            // Audio Setup (Tone.js)
            let synth, winSynth, errorSynth;

            const initAudio = async () => {
                if (audioInitialized) return;
                await Tone.start();
                
                // Main Synth for moves
                synth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: { attack: 0.005, decay: 0.1, sustain: 0.1, release: 0.5 }
                }).toDestination();
                synth.volume.value = -5;

                // Win Synth
                winSynth = new Tone.MetalSynth({
                    frequency: 200, envelope: { attack: 0.001, decay: 0.1, release: 0.01 },
                    harmonicity: 5.1, modulationIndex: 32, resonance: 4000, octaves: 1.5
                }).toDestination();
                winSynth.volume.value = -10;

                // Error/Draw Synth
                errorSynth = new Tone.MembraneSynth().toDestination();

                audioInitialized = true;
            };

            const playMoveSound = (player) => {
                if (!audioInitialized) return;
                if (player === 'X') {
                    synth.triggerAttackRelease(["C5", "E5"], "8n");
                } else {
                    synth.triggerAttackRelease(["G4", "B4"], "8n");
                }
            };

            const playWinSound = () => {
                if (!audioInitialized) return;
                const now = Tone.now();
                winSynth.triggerAttackRelease("C6", "8n", now);
                winSynth.triggerAttackRelease("E6", "8n", now + 0.1);
                winSynth.triggerAttackRelease("G6", "8n", now + 0.2);
                winSynth.triggerAttackRelease("C7", "4n", now + 0.3);
            };

            const playDrawSound = () => {
                if (!audioInitialized) return;
                errorSynth.triggerAttackRelease("C2", "4n");
            };

            // Core Functions
            const init = () => {
                renderGrid();
                resetGame();
                
                // Event Listeners
                document.getElementById('reset-btn').addEventListener('click', resetGame);
                document.getElementById('mode-btn').addEventListener('click', toggleMode);
                document.getElementById('play-again-btn').addEventListener('click', () => {
                    closeModal();
                    resetGame();
                });
                document.getElementById('change-mode-btn').addEventListener('click', () => {
                    closeModal();
                    toggleMode();
                    resetGame();
                });
                
                document.getElementById('init-btn').addEventListener('click', () => {
                    initAudio();
                    document.getElementById('start-overlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('start-overlay').style.display = 'none';
                        gameActive = true;
                    }, 500);
                });
            };

            const renderGrid = () => {
                gridEl.innerHTML = '';
                board.forEach((cell, index) => {
                    const cellEl = document.createElement('div');
                    cellEl.classList.add('cell', 'rounded-lg', 'flex', 'items-center', 'justify-center', 'text-5xl', 'cursor-pointer', 'shadow-lg');
                    cellEl.dataset.index = index;
                    cellEl.addEventListener('click', () => handleCellClick(index));
                    gridEl.appendChild(cellEl);
                });
            };

            const updateStatus = () => {
                statusEl.textContent = mode === 'AI' && currentPlayer === 'O' ? 'AI THINKING...' : `PLAYER ${currentPlayer}`;
                statusEl.className = currentPlayer === 'X' ? 'text-cyan-400' : 'text-pink-500';
                
                // Update visual indicator on grid (optional border glow)
                gridEl.style.boxShadow = currentPlayer === 'X' 
                    ? '0 0 20px rgba(6, 182, 212, 0.2)' 
                    : '0 0 20px rgba(236, 72, 153, 0.2)';
            };

            const handleCellClick = (index) => {
                if (!gameActive || board[index] !== null) return;
                
                // If AI mode and it's AI's turn, ignore clicks
                if (mode === 'AI' && currentPlayer === 'O') return;

                makeMove(index, currentPlayer);

                if (gameActive && mode === 'AI' && currentPlayer === 'O') {
                    gameActive = false; // Block input temporarily
                    setTimeout(aiMove, 600); // Artificial delay
                }
            };

            const makeMove = (index, player) => {
                board[index] = player;
                const cell = gridEl.children[index];
                
                // Visuals
                const span = document.createElement('span');
                span.textContent = player;
                span.className = `font-cyber font-bold animate-bounce-short ${player === 'X' ? 'marker-x glow-text-cyan' : 'marker-o glow-text-pink'}`;
                // Add custom animation class manually
                span.style.animation = "popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                cell.appendChild(span);

                playMoveSound(player);
                checkResult();
            };

            const aiMove = () => {
                if (!gameActive) return;

                // Simple AI: Minimax would be too long for this snippet, using logic:
                // 1. Win if possible
                // 2. Block opponent win
                // 3. Take center
                // 4. Take corner
                // 5. Random

                let bestMove = -1;

                // Check for winning move
                bestMove = findBestMove('O');
                if (bestMove !== -1) {
                    executeAIMove(bestMove);
                    return;
                }

                // Check for blocking move
                bestMove = findBestMove('X');
                if (bestMove !== -1) {
                    executeAIMove(bestMove);
                    return;
                }

                // Take center
                if (board[4] === null) {
                    executeAIMove(4);
                    return;
                }

                // Take corner
                const corners = [0, 2, 6, 8];
                const availableCorners = corners.filter(i => board[i] === null);
                if (availableCorners.length > 0) {
                    executeAIMove(availableCorners[Math.floor(Math.random() * availableCorners.length)]);
                    return;
                }

                // Random
                const available = board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                if (available.length > 0) {
                    executeAIMove(available[Math.floor(Math.random() * available.length)]);
                }
            };

            const findBestMove = (player) => {
                for (let condition of winConditions) {
                    const [a, b, c] = condition;
                    const vals = [board[a], board[b], board[c]];
                    const count = vals.filter(v => v === player).length;
                    const empty = vals.filter(v => v === null).length;
                    
                    if (count === 2 && empty === 1) {
                        // Found a winning/blocking spot
                        if (board[a] === null) return a;
                        if (board[b] === null) return b;
                        if (board[c] === null) return c;
                    }
                }
                return -1;
            };

            const executeAIMove = (index) => {
                makeMove(index, 'O');
                gameActive = true; // Re-enable input
            };

            const checkResult = () => {
                let roundWon = false;
                let winningLine = [];

                for (let i = 0; i < winConditions.length; i++) {
                    const [a, b, c] = winConditions[i];
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        roundWon = true;
                        winningLine = [a, b, c];
                        break;
                    }
                }

                if (roundWon) {
                    endGame(false, winningLine);
                    return;
                }

                if (!board.includes(null)) {
                    endGame(true);
                    return;
                }

                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updateStatus();
            };

            const endGame = (draw, winningLine = []) => {
                gameActive = false;
                if (draw) {
                    resultTitle.textContent = "DRAW";
                    resultTitle.className = "text-4xl font-cyber font-bold mb-2 text-gray-400";
                    resultMsg.textContent = "SYSTEM BALANCE RESTORED";
                    playDrawSound();
                } else {
                    const winner = currentPlayer;
                    scores[winner]++;
                    updateScoreboard();
                    
                    resultTitle.textContent = mode === 'AI' && winner === 'O' ? "AI WINS" : `PLAYER ${winner} WINS`;
                    resultTitle.className = `text-4xl font-cyber font-bold mb-2 ${winner === 'X' ? 'text-cyan-400 glow-text-cyan' : 'text-pink-500 glow-text-pink'}`;
                    resultMsg.textContent = "SEQUENCE COMPLETED SUCCESSFULLY";
                    playWinSound();

                    // Highlight winning cells
                    winningLine.forEach(index => {
                        gridEl.children[index].classList.add('winning-cell');
                        gridEl.children[index].style.borderColor = winner === 'X' ? '#06b6d4' : '#ec4899';
                    });
                }

                setTimeout(() => {
                    openModal();
                }, 1000);
            };

            const updateScoreboard = () => {
                scoreXEl.textContent = scores.X;
                scoreOEl.textContent = scores.O;
                // Animate score change
                scoreXEl.parentElement.classList.add('scale-125');
                setTimeout(() => scoreXEl.parentElement.classList.remove('scale-125'), 200);
            };

            const resetGame = () => {
                board.fill(null);
                currentPlayer = 'X';
                gameActive = true;
                round++;
                roundEl.textContent = round;
                
                // Clear UI
                Array.from(gridEl.children).forEach(cell => {
                    cell.innerHTML = '';
                    cell.classList.remove('winning-cell');
                    cell.style.borderColor = '';
                });
                
                closeModal();
                updateStatus();
            };

            const toggleMode = () => {
                mode = mode === '2P' ? 'AI' : '2P';
                modeText.textContent = mode === '2P' ? '2 PLAYERS' : 'VS AI';
                scores = { X: 0, O: 0 };
                round = 0;
                resetGame();
            };

            const openModal = () => {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modalContent.classList.remove('scale-90');
                modalContent.classList.add('scale-100');
            };

            const closeModal = () => {
                modal.classList.add('opacity-0', 'pointer-events-none');
                modalContent.classList.remove('scale-100');
                modalContent.classList.add('scale-90');
            };

            return { init };
        })();

        /**
         * Background Animation (Canvas Particles)
         */
        const initBackground = () => {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];

            const resize = () => {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.vy = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 2;
                    this.color = Math.random() > 0.5 ? 'rgba(6, 182, 212, ' : 'rgba(236, 72, 153, '; // Cyan or Pink
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < 0 || this.x > width) this.vx *= -1;
                    if (this.y < 0 || this.y > height) this.vy *= -1;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + '0.5)';
                    ctx.fill();
                }
            }

            for (let i = 0; i < 50; i++) particles.push(new Particle());

            const animate = () => {
                ctx.clearRect(0, 0, width, height);
                
                // Draw connections
                particles.forEach((p, index) => {
                    p.update();
                    p.draw();
                    
                    for (let j = index + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dx = p.x - p2.x;
                        const dy = p.y - p2.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);

                        if (dist < 150) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 - dist/1500})`;
                            ctx.lineWidth = 0.5;
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                });
                requestAnimationFrame(animate);
            };
            animate();
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            Game.init();
            initBackground();
        });

    </script>
    
    <style>
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-short {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</body>
</html>
