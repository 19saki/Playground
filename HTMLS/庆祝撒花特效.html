<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庆祝撒花特效</title>
    <style>
        /* 基础样式：去除默认边距，确保画布全屏 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止出现滚动条 */
            background-color: #f0f2f5; /* 可以修改背景色 */
        }

        /* 画布样式：绝对定位覆盖全屏 */
        #confetti-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999; /* 确保在最上层 */
            pointer-events: none; /* 允许点击穿透，不影响下方按钮操作 */
        }

        /* 你的网页内容可以放在这里，例如： */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding-top: 30vh;
            font-family: sans-serif;
            color: #333;
        }
    </style>
</head>
<body>

    <!-- 示例内容 -->
    <div class="content">
        <h1>🎉 恭喜发财！🎉</h1>
        <p>网页加载完成，祝您有个好心情！</p>
    </div>

    <!-- 画布 -->
    <canvas id="confetti-canvas"></canvas>

    <script>
        (function() {
            // 1. 配置参数
            const config = {
                particleCount: 150,      // 粒子数量
                particleMaxSize: 12,     // 粒子最大尺寸
                particleMinSize: 6,      // 粒子最小尺寸
                particleSpeed: 3,        // 下落速度基数
                colors: [                // 彩纸颜色数组
                    '#EF476F', // 粉红
                    '#FFD166', // 黄色
                    '#06D6A0', // 绿色
                    '#118AB2', // 蓝色
                    '#073B4C'  // 深蓝
                ],
                startAngle: 0,
                angleIncrement: 0.01,    // 旋转速度
                tiltIncrement: 0.1       // 倾斜变化
            };

            // 2. 初始化画布
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            // 处理窗口大小改变
            window.addEventListener('resize', function() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            });

            // 初始设置画布大小
            canvas.width = width;
            canvas.height = height;

            // 3. 粒子类 (Confetti Piece)
            class Confetti {
                constructor() {
                    this.init();
                }

                init() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height - height; // 从屏幕上方不同位置开始
                    this.color = config.colors[Math.floor(Math.random() * config.colors.length)];
                    this.size = Math.random() * (config.particleMaxSize - config.particleMinSize) + config.particleMinSize;
                    
                    // 运动参数
                    this.tilt = Math.random() * 10; // 初始倾斜
                    this.tiltAngle = Math.random() * Math.PI * 2; // 倾斜角度
                    this.tiltAngleIncrement = Math.random() * 0.07 + 0.05; // 旋转速度
                    
                    // 速度向量
                    this.velocityX = Math.random() * 2 - 1; // 水平漂移 (-1 到 1)
                    this.velocityY = Math.random() * 2 + config.particleSpeed; // 垂直下落
                }

                update() {
                    this.tiltAngle += config.tiltIncrement; // 持续旋转
                    this.tilt += Math.sin(this.tiltAngle) * 3; // 模拟3D翻转效果

                    this.x += Math.sin(this.tiltAngle) * 1 + this.velocityX; // 复杂运动轨迹
                    this.y += Math.cos(this.tiltAngle) + this.velocityY;

                    // 如果粒子跑出屏幕底部，重置到顶部
                    if (this.y > height + 10) {
                        this.init();
                        // 为了让它随机分布，不要每次都重置到正上方，而是从上方不同位置出现
                        this.y = -20; 
                        this.x = Math.random() * width;
                    }
                    
                    // 如果跑出左右屏幕，简单重置X
                    if (this.x > width + 20 || this.x < -20) {
                         this.x = Math.random() * width;
                    }
                }

                draw() {
                    ctx.save();
                    ctx.beginPath();
                    // 绘制旋转的矩形
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.tiltAngle);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                    ctx.restore();
                }
            }

            // 4. 初始化粒子池
            function initParticles() {
                particles = [];
                for (let i = 0; i < config.particleCount; i++) {
                    particles.push(new Confetti());
                }
            }

            // 5. 动画循环
            function animate() {
                // 清除画布 (如果想要拖尾效果，可以改为 fillRect 填充半透明背景)
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }

                requestAnimationFrame(animate);
            }

            // 启动
            initParticles();
            animate();

        })();
    </script>
</body>
</html>
