<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zai Typewriter Effect</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义字体，使用等宽字体以获得更好的打字机体验 */
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505; /* 极深黑，避免纯黑的死板 */
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* CRT 扫描线效果 overlay */
        .scanlines {
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: 20;
            pointer-events: none;
        }

        /* 光标闪烁动画 */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cursor-blink {
            animation: blink 0.8s infinite;
        }

        /* 文字发光效果 */
        .neon-text {
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5), 
                         0 0 20px rgba(34, 211, 238, 0.3), 
                         0 0 30px rgba(34, 211, 238, 0.1);
        }
        
        /* 光标发光效果 */
        .neon-cursor {
            background-color: #22d3ee; /* Tailwind cyan-400 */
            box-shadow: 0 0 10px #22d3ee;
        }
    </style>
</head>
<body class="w-screen h-screen flex items-center justify-center relative text-white selection:bg-cyan-500 selection:text-black">

    <!-- 动态背景 Canvas -->
    <canvas id="bg-canvas" class="absolute inset-0 z-0"></canvas>

    <!-- CRT 扫描线遮罩 -->
    <div class="scanlines"></div>

    <!-- 主内容区 -->
    <main class="z-10 relative flex flex-col items-center justify-center p-4">
        
        <!-- 装饰性标签 -->
        <div class="absolute top-10 left-10 text-xs text-cyan-700 tracking-[0.3em] uppercase border-l-2 border-cyan-800 pl-3 animate-pulse">
            System Status: Online<br>
            Rendering: Active
        </div>

        <!-- 打字机容器 -->
        <div class="text-2xl md:text-5xl lg:text-7xl font-bold text-center tracking-tight min-h-[1.2em] flex items-center justify-center">
            <!-- 文本内容 -->
            <span id="typewriter-text" class="neon-text"></span>
            <!-- 光标 -->
            <span id="typewriter-cursor" class="w-1 md:w-3 h-[1.2em] ml-1 neon-cursor cursor-blink"></span>
        </div>

        <!-- 底部提示 -->
        <div class="mt-12 text-gray-600 text-sm tracking-widest opacity-60">
            &lt; ZAI FRONTEND ENGINEERING /&gt;
        </div>
    </main>

    <script>
        /**
         * 模块 1: 动态粒子背景
         * 目标：创建一个科技感强、不抢眼的动态背景。
         */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        
        // 响应式调整
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // 粒子类
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5; // 速度极慢，营造静谧感
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(34, 211, 238, ${Math.random() * 0.3 + 0.1})`; // 青色微光
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // 边界反弹
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 初始化粒子
        const particleCount = Math.min(window.innerWidth / 10, 100); // 根据屏幕宽度决定粒子数量
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // 动画循环
        function animateBg() {
            ctx.clearRect(0, 0, width, height);
            
            // 绘制连线
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(34, 211, 238, ${0.15 - distance/1000})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateBg);
        }
        animateBg();


        /**
         * 模块 2: 打字机逻辑核心
         * 目标：流畅的打字、停顿、删除、循环。
         */
        const textElement = document.getElementById('typewriter-text');
        const cursorElement = document.getElementById('typewriter-cursor');
        
        // 配置项
        const phrases = [
            "你好，欢迎来到未来。",
            "代码不仅仅是逻辑。",
            "它是视觉的艺术。",
            "极致的体验由此开始。",
            "由 Zai 驱动。"
        ];
        
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;
        
        // 时间配置 (毫秒)
        const typeSpeed = 100;      // 打字速度
        const deleteSpeed = 50;     // 删除速度（通常比打字快）
        const pauseTime = 2000;     // 打完一句话后的停顿
        const startDelay = 500;     // 页面加载后的初始延迟

        // 递归函数实现循环
        function typeLoop() {
            const currentPhrase = phrases[phraseIndex];
            
            if (isDeleting) {
                // 删除逻辑
                textElement.innerText = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                // 打字逻辑
                textElement.innerText = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            // 动态调整下一步的时间
            let nextSpeed = typeSpeed;

            if (isDeleting) {
                nextSpeed = deleteSpeed;
                // 如果删完了
                if (charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    nextSpeed = 500; // 删完后稍微停顿一下再开始打新的
                }
            } else {
                // 正在打字
                // 如果打完了
                if (charIndex === currentPhrase.length) {
                    isDeleting = true;
                    nextSpeed = pauseTime; // 长时间停顿
                } else {
                    // 加入一点点随机性，模拟打字机的非机械感（可选，这里保持稳定更有科技感）
                    // nextSpeed = typeSpeed + (Math.random() * 50 - 25); 
                }
            }

            setTimeout(typeLoop, nextSpeed);
        }

        // 启动
        setTimeout(typeLoop, startDelay);

    </script>
</body>
</html>
