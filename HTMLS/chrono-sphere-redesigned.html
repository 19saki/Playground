<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrono Sphere - Zai Special Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            user-select: none;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* Scanlines overlay */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 5;
        }

        /* UI Layer */
        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── Arc decorations that wrap the clock ── */
        .arc-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid transparent;
            pointer-events: none;
        }
        .arc-ring-1 {
            width: 480px; height: 480px;
            border-color: rgba(0, 243, 255, 0.15);
            animation: spin-cw 20s linear infinite;
        }
        .arc-ring-2 {
            width: 520px; height: 520px;
            border-top-color: rgba(255, 0, 255, 0.25);
            border-right-color: rgba(255, 0, 255, 0.25);
            animation: spin-ccw 14s linear infinite;
        }
        .arc-ring-3 {
            width: 560px; height: 560px;
            border-bottom-color: rgba(0, 243, 255, 0.12);
            border-left-color: rgba(0, 243, 255, 0.12);
            animation: spin-cw 30s linear infinite;
        }

        /* Tick marks on arc-ring-1 */
        .tick-container {
            position: absolute;
            width: 480px; height: 480px;
            border-radius: 50%;
            animation: spin-cw 20s linear infinite;
        }
        .tick {
            position: absolute;
            width: 1px;
            background: rgba(0, 243, 255, 0.5);
            left: 50%;
            transform-origin: bottom center;
        }
        .tick.major { height: 14px; top: 0; background: rgba(0, 243, 255, 0.9); width: 2px; }
        .tick.minor { height: 7px; top: 0; background: rgba(0, 243, 255, 0.35); }

        @keyframes spin-cw  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
        @keyframes spin-ccw { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }

        /* ── Core clock block ── */
        .clock-core {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* Top label */
        .top-label {
            font-size: 0.65rem;
            letter-spacing: 0.5em;
            color: rgba(0, 243, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        /* Horizontal rule lines */
        .h-rule {
            width: 320px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.6), transparent);
            margin: 0.4rem 0;
            position: relative;
        }
        .h-rule::before, .h-rule::after {
            content: '';
            position: absolute;
            top: -3px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00f3ff;
            box-shadow: 0 0 8px #00f3ff;
        }
        .h-rule::before { left: 0; }
        .h-rule::after  { right: 0; }

        /* Main time display */
        .time-display {
            display: flex;
            align-items: baseline;
            gap: 0;
            line-height: 1;
        }

        .time-hm {
            font-size: clamp(4rem, 10vw, 7.5rem);
            font-weight: 900;
            color: #e0fbfc;
            text-shadow:
                0 0 8px rgba(0, 243, 255, 0.6),
                0 0 20px rgba(0, 243, 255, 0.3),
                0 0 50px rgba(0, 243, 255, 0.15);
            letter-spacing: 0.04em;
        }

        .time-sep {
            font-size: clamp(3rem, 7vw, 5.5rem);
            font-weight: 900;
            color: rgba(0, 243, 255, 0.4);
            animation: blink 1s step-end infinite;
            margin: 0 0.1em;
            align-self: center;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

        .time-seconds {
            font-size: clamp(2rem, 4.5vw, 3.5rem);
            font-weight: 700;
            color: #00f3ff;
            text-shadow: 0 0 12px rgba(0, 243, 255, 0.9), 0 0 30px rgba(0, 243, 255, 0.4);
            align-self: flex-end;
            padding-bottom: 0.25em;
            letter-spacing: 0.05em;
        }

        /* Millisecond bar */
        .ms-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 320px;
            margin-top: 0.2rem;
        }
        .ms-label {
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            color: rgba(255, 0, 255, 0.5);
        }
        .ms-bar-track {
            flex: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .ms-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f3ff, #ff00ff);
            border-radius: 2px;
            width: 0%;
            box-shadow: 0 0 6px rgba(0, 243, 255, 0.8);
            transition: width 0.05s linear;
        }
        .ms-value {
            font-size: 0.6rem;
            color: rgba(0, 243, 255, 0.5);
            width: 28px;
            text-align: right;
        }

        /* Date row */
        .date-row {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-top: 0.6rem;
        }
        .date-part {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            color: rgba(255, 0, 255, 0.7);
            text-shadow: 0 0 8px rgba(255, 0, 255, 0.4);
        }
        .date-dot {
            width: 3px; height: 3px;
            border-radius: 50%;
            background: rgba(255,0,255,0.5);
        }

        /* Corner bracket decorations */
        .corner {
            position: absolute;
            width: 20px; height: 20px;
            border-color: rgba(0, 243, 255, 0.5);
            border-style: solid;
        }
        .corner-tl { top: -12px; left: -16px; border-width: 2px 0 0 2px; }
        .corner-tr { top: -12px; right: -16px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: -12px; left: -16px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: -12px; right: -16px; border-width: 0 2px 2px 0; }

        /* Crosshair center dot */
        .center-dot {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #00f3ff;
            box-shadow: 0 0 12px #00f3ff, 0 0 24px rgba(0,243,255,0.5);
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            pointer-events: none;
            z-index: 11;
            /* only visible if no other element covers it */
        }

        /* Bottom status bar */
        .status-bar {
            position: absolute;
            bottom: 2rem;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }
        .status-item {
            font-size: 0.55rem;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
        .status-dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: rgba(0,243,255,0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

        /* ── Holographic glitch overlay ── */
        .glitch-line {
            position: fixed;
            left: 0; right: 0;
            height: 1px;
            background: rgba(0, 243, 255, 0.3);
            pointer-events: none;
            z-index: 6;
            animation: glitch-move 6s linear infinite;
            opacity: 0;
        }
        @keyframes glitch-move {
            0%   { top: -2px; opacity: 0; }
            5%   { opacity: 0.6; }
            95%  { opacity: 0.2; }
            100% { top: 100vh; opacity: 0; }
        }

        @media (max-width: 600px) {
            .arc-ring-1 { width: 300px; height: 300px; }
            .arc-ring-2 { width: 330px; height: 330px; }
            .arc-ring-3 { width: 360px; height: 360px; }
            .tick-container { width: 300px; height: 300px; }
            .h-rule, .ms-row, .date-row { width: 240px; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div class="scanlines"></div>
<div class="glitch-line"></div>

<div id="ui-layer">

    <!-- Rotating arc rings -->
    <div class="arc-ring arc-ring-3"></div>
    <div class="arc-ring arc-ring-2"></div>
    <div class="arc-ring arc-ring-1"></div>

    <!-- Tick marks (built by JS) -->
    <div class="tick-container" id="tick-ring"></div>

    <!-- Clock core -->
    <div class="clock-core">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="top-label">CHRONO INTERFACE</div>

        <div class="h-rule"></div>

        <div class="time-display">
            <span class="time-hm" id="hm">00:00</span>
            <span class="time-sep" id="sep">:</span>
            <span class="time-seconds" id="sec">00</span>
        </div>

        <div class="h-rule"></div>

        <div class="ms-row">
            <span class="ms-label">MS</span>
            <div class="ms-bar-track"><div class="ms-bar-fill" id="ms-bar"></div></div>
            <span class="ms-value" id="ms-val">000</span>
        </div>

        <div class="date-row">
            <span class="date-part" id="weekday">SAT</span>
            <div class="date-dot"></div>
            <span class="date-part" id="datestr">JAN 01 2025</span>
            <div class="date-dot"></div>
            <span class="date-part" id="timezone">UTC+?</span>
        </div>
    </div>

    <!-- Bottom status -->
    <div class="status-bar">
        <span class="status-item">ZAI SYSTEM</span>
        <div class="status-dot"></div>
        <span class="status-item">CHRONO v2.0</span>
        <div class="status-dot"></div>
        <span class="status-item">ONLINE</span>
    </div>
</div>

<script>
    // ── Build tick marks ──
    const tickRing = document.getElementById('tick-ring');
    for (let i = 0; i < 60; i++) {
        const tick = document.createElement('div');
        tick.className = 'tick ' + (i % 5 === 0 ? 'major' : 'minor');
        const angle = i * 6; // 360/60
        const r = 240; // half of 480px
        const rad = (angle - 90) * Math.PI / 180;
        const cx = 240, cy = 0; // top center of the ring
        // Position using rotation transform from center
        tick.style.cssText = `
            position: absolute;
            left: 50%;
            top: 0;
            transform-origin: 0 ${240}px;
            transform: translateX(-50%) rotate(${angle}deg);
        `;
        tickRing.appendChild(tick);
    }

    // ── Clock update ──
    const hmEl = document.getElementById('hm');
    const secEl = document.getElementById('sec');
    const msValEl = document.getElementById('ms-val');
    const msBarEl = document.getElementById('ms-bar');
    const weekdayEl = document.getElementById('weekday');
    const datestrEl = document.getElementById('datestr');
    const tzEl = document.getElementById('timezone');

    const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

    function updateTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        const s = String(now.getSeconds()).padStart(2,'0');
        const ms = now.getMilliseconds();
        hmEl.textContent = `${h}:${m}`;
        secEl.textContent = s;
        msValEl.textContent = String(ms).padStart(3,'0');
        msBarEl.style.width = (ms / 999 * 100) + '%';
        weekdayEl.textContent = DAYS[now.getDay()];
        datestrEl.textContent = `${MONTHS[now.getMonth()]} ${String(now.getDate()).padStart(2,'0')} ${now.getFullYear()}`;
        const offset = -now.getTimezoneOffset() / 60;
        tzEl.textContent = `UTC${offset >= 0 ? '+' : ''}${offset}`;
        requestAnimationFrame(updateTime);
    }
    updateTime();

    // ── Three.js scene ──
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.0015);
    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.z = 30;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Core icosahedron
    const coreSphere = new THREE.Mesh(
        new THREE.IcosahedronGeometry(10, 2),
        new THREE.MeshBasicMaterial({ color: 0x1a1a2e, wireframe: true, transparent: true, opacity: 0.25 })
    );
    scene.add(coreSphere);

    // Inner sphere
    const innerSphere = new THREE.Mesh(
        new THREE.IcosahedronGeometry(6, 1),
        new THREE.MeshBasicMaterial({ color: 0x00f3ff, wireframe: true, transparent: true, opacity: 0.08 })
    );
    scene.add(innerSphere);

    // Outer gossamer sphere
    const outerSphere = new THREE.Mesh(
        new THREE.IcosahedronGeometry(14, 3),
        new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true, transparent: true, opacity: 0.04 })
    );
    scene.add(outerSphere);

    // Particles
    const pCount = 2000;
    const pPos = new Float32Array(pCount * 3);
    for (let i = 0; i < pCount * 3; i++) pPos[i] = (Math.random() - 0.5) * 120;
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ size: 0.12, color: 0xffffff, transparent: true, opacity: 0.6 }));
    scene.add(particles);

    // Rings
    function makeRing(r, tube, color, opacity, rx, ry) {
        const m = new THREE.Mesh(
            new THREE.TorusGeometry(r, tube, 16, 120),
            new THREE.MeshBasicMaterial({ color, transparent: true, opacity })
        );
        m.rotation.x = rx || 0;
        m.rotation.y = ry || 0;
        scene.add(m);
        return m;
    }
    const ring1 = makeRing(18, 0.08, 0xff00ff, 0.18, Math.PI/2, 0);
    const ring2 = makeRing(22, 0.05, 0x00f3ff, 0.10, Math.PI/1.8, Math.PI/6);
    const ring3 = makeRing(25, 0.04, 0xffffff, 0.05, Math.PI/3, Math.PI/4);

    // Mouse parallax
    let mx = 0, my = 0;
    document.addEventListener('mousemove', e => {
        mx = e.clientX - innerWidth/2;
        my = e.clientY - innerHeight/2;
    });

    const clock3 = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const t = clock3.getElapsedTime();
        coreSphere.rotation.y += 0.0015;
        coreSphere.rotation.x += 0.0007;
        innerSphere.rotation.y -= 0.004;
        outerSphere.rotation.y += 0.0005;
        outerSphere.rotation.z += 0.0003;
        const s = 1 + Math.sin(t * 1.5) * 0.04;
        innerSphere.scale.set(s, s, s);
        ring1.rotation.z += 0.0015;
        ring2.rotation.z -= 0.002;
        ring3.rotation.z += 0.001;
        particles.rotation.y = t * 0.04;
        particles.rotation.x = t * 0.015;
        camera.position.x += (mx * 0.008 - camera.position.x) * 0.05;
        camera.position.y += (-my * 0.008 - camera.position.y) * 0.05;
        camera.lookAt(scene.position);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth/innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });
</script>
</body>
</html>
