<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 20px;
        }
        
        .score-container, .best-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }
        
        .score-title, .best-title {
            font-size: 0.9rem;
            color: #eee;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .score, .best {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }
        
        .instructions {
            text-align: center;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .tile {
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            transition: all 0.15s ease;
        }
        
        .tile-0 {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .tile-2 {
            background-color: #eee4da;
            color: #776e65;
        }
        
        .tile-4 {
            background-color: #ede0c8;
            color: #776e65;
        }
        
        .tile-8 {
            background-color: #f2b179;
            color: #f9f6f2;
        }
        
        .tile-16 {
            background-color: #f59563;
            color: #f9f6f2;
        }
        
        .tile-32 {
            background-color: #f67c5f;
            color: #f9f6f2;
        }
        
        .tile-64 {
            background-color: #f65e3b;
            color: #f9f6f2;
        }
        
        .tile-128 {
            background-color: #edcf72;
            color: #f9f6f2;
            font-size: 1.6rem;
        }
        
        .tile-256 {
            background-color: #edcc61;
            color: #f9f6f2;
            font-size: 1.6rem;
        }
        
        .tile-512 {
            background-color: #edc850;
            color: #f9f6f2;
            font-size: 1.6rem;
        }
        
        .tile-1024 {
            background-color: #edc53f;
            color: #f9f6f2;
            font-size: 1.4rem;
        }
        
        .tile-2048 {
            background-color: #edc22e;
            color: #f9f6f2;
            font-size: 1.4rem;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            justify-content: center;
        }
        
        button {
            background: linear-gradient(to right, #ff9966, #ff5e62);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(1px);
        }
        
        .game-over, .game-won {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            z-index: 10;
        }
        
        .game-over h2, .game-won h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #ff5e62;
        }
        
        .game-won h2 {
            color: #4CAF50;
        }
        
        .key-hints {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            color: #aaa;
        }
        
        .key {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        
        footer {
            margin-top: 20px;
            color: #777;
            font-size: 0.8rem;
            text-align: center;
        }
        
        @media (max-width: 520px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .game-board {
                max-width: 95vw;
            }
            
            .tile {
                font-size: 1.4rem;
            }
            
            .tile-128, .tile-256, .tile-512 {
                font-size: 1.2rem;
            }
            
            .tile-1024, .tile-2048 {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>2048</h1>
            <p class="instructions">使用键盘方向键移动方块。当两个相同数字的方块碰撞时，它们会合并成一个！</p>
        </header>
        
        <div class="game-info">
            <div class="score-container">
                <div class="score-title">分数</div>
                <div class="score">0</div>
            </div>
            <div class="best-container">
                <div class="best-title">最高分</div>
                <div class="best">0</div>
            </div>
        </div>
        
        <div class="game-board" id="gameBoard">
            <!-- 游戏方块会通过JavaScript动态生成 -->
        </div>
        
        <div class="controls">
            <button id="newGameBtn">新游戏</button>
            <button id="undoBtn">撤销</button>
        </div>
        
        <div class="key-hints">
            <div class="key">↑</div>
            <div class="key">↓</div>
            <div class="key">←</div>
            <div class="key">→</div>
            <div class="key">移动方块</div>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>游戏结束!</h2>
            <p>你的最终分数: <span id="finalScore">0</span></p>
            <button id="restartBtn">再玩一次</button>
        </div>
        
        <div class="game-won" id="gameWon">
            <h2>恭喜你赢了!</h2>
            <p>你获得了2048方块!</p>
            <button id="continueBtn">继续游戏</button>
        </div>
        
        <footer>
            <p>2048游戏 - 使用方向键控制 | 单HTML文件实现</p>
        </footer>
    </div>

    <script>
        // 游戏状态变量
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048-bestScore') || 0;
        let gameOver = false;
        let gameWon = false;
        let history = [];
        const BOARD_SIZE = 4;
        
        // DOM元素
        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.querySelector('.score');
        const bestDisplay = document.querySelector('.best');
        const newGameBtn = document.getElementById('newGameBtn');
        const undoBtn = document.getElementById('undoBtn');
        const gameOverScreen = document.getElementById('gameOver');
        const gameWonScreen = document.getElementById('gameWon');
        const finalScoreDisplay = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const continueBtn = document.getElementById('continueBtn');
        
        // 初始化游戏
        function initGame() {
            // 初始化空棋盘
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            
            // 重置游戏状态
            score = 0;
            gameOver = false;
            gameWon = false;
            history = [];
            
            // 更新显示
            updateScore();
            bestDisplay.textContent = bestScore;
            
            // 隐藏游戏结束/胜利屏幕
            gameOverScreen.style.display = 'none';
            gameWonScreen.style.display = 'none';
            
            // 生成初始的两个方块
            addRandomTile();
            addRandomTile();
            
            // 渲染棋盘
            renderBoard();
        }
        
        // 添加随机方块（90%概率为2，10%概率为4）
        function addRandomTile() {
            // 找到所有空位置
            const emptyCells = [];
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === 0) {
                        emptyCells.push({row, col});
                    }
                }
            }
            
            // 如果没有空位置，返回false
            if (emptyCells.length === 0) return false;
            
            // 随机选择一个空位置
            const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            
            // 随机确定方块的值（90%概率为2，10%概率为4）
            const value = Math.random() < 0.9 ? 2 : 4;
            
            // 在棋盘上放置方块
            board[randomCell.row][randomCell.col] = value;
            
            return true;
        }
        
        // 渲染棋盘
        function renderBoard() {
            // 清空棋盘
            gameBoard.innerHTML = '';
            
            // 创建方块
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const tileValue = board[row][col];
                    const tile = document.createElement('div');
                    
                    // 设置方块类名和内容
                    tile.className = `tile tile-${tileValue}`;
                    tile.textContent = tileValue !== 0 ? tileValue : '';
                    
                    // 添加到棋盘
                    gameBoard.appendChild(tile);
                }
            }
        }
        
        // 保存当前状态到历史记录
        function saveState() {
            // 深拷贝当前棋盘和分数
            const boardCopy = board.map(row => [...row]);
            history.push({
                board: boardCopy,
                score: score
            });
            
            // 只保留最近10步历史
            if (history.length > 10) {
                history.shift();
            }
        }
        
        // 撤销上一步
        function undo() {
            if (history.length === 0 || gameOver || gameWon) return;
            
            const previousState = history.pop();
            board = previousState.board.map(row => [...row]);
            score = previousState.score;
            
            updateScore();
            renderBoard();
        }
        
        // 移动方块（主逻辑）
        function move(direction) {
            // 如果游戏已经结束，不执行移动
            if (gameOver) return false;
            
            // 保存当前状态到历史记录
            saveState();
            
            let moved = false;
            const oldBoard = board.map(row => [...row]);
            
            // 根据方向处理移动
            switch(direction) {
                case 'up':
                    moved = moveUp();
                    break;
                case 'down':
                    moved = moveDown();
                    break;
                case 'left':
                    moved = moveLeft();
                    break;
                case 'right':
                    moved = moveRight();
                    break;
            }
            
            // 如果棋盘发生了变化，添加新方块并检查游戏状态
            if (moved) {
                addRandomTile();
                renderBoard();
                updateScore();
                checkGameStatus();
                return true;
            }
            
            return false;
        }
        
        // 向上移动
        function moveUp() {
            let moved = false;
            
            for (let col = 0; col < BOARD_SIZE; col++) {
                // 处理合并
                for (let row = 1; row < BOARD_SIZE; row++) {
                    if (board[row][col] !== 0) {
                        let currentRow = row;
                        
                        while (currentRow > 0 && board[currentRow-1][col] === 0) {
                            // 向上移动方块
                            board[currentRow-1][col] = board[currentRow][col];
                            board[currentRow][col] = 0;
                            currentRow--;
                            moved = true;
                        }
                        
                        // 检查是否可以合并
                        if (currentRow > 0 && board[currentRow-1][col] === board[currentRow][col]) {
                            // 合并方块
                            board[currentRow-1][col] *= 2;
                            board[currentRow][col] = 0;
                            score += board[currentRow-1][col];
                            moved = true;
                        }
                    }
                }
            }
            
            return moved;
        }
        
        // 向下移动
        function moveDown() {
            let moved = false;
            
            for (let col = 0; col < BOARD_SIZE; col++) {
                // 处理合并
                for (let row = BOARD_SIZE - 2; row >= 0; row--) {
                    if (board[row][col] !== 0) {
                        let currentRow = row;
                        
                        while (currentRow < BOARD_SIZE - 1 && board[currentRow+1][col] === 0) {
                            // 向下移动方块
                            board[currentRow+1][col] = board[currentRow][col];
                            board[currentRow][col] = 0;
                            currentRow++;
                            moved = true;
                        }
                        
                        // 检查是否可以合并
                        if (currentRow < BOARD_SIZE - 1 && board[currentRow+1][col] === board[currentRow][col]) {
                            // 合并方块
                            board[currentRow+1][col] *= 2;
                            board[currentRow][col] = 0;
                            score += board[currentRow+1][col];
                            moved = true;
                        }
                    }
                }
            }
            
            return moved;
        }
        
        // 向左移动
        function moveLeft() {
            let moved = false;
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                // 处理合并
                for (let col = 1; col < BOARD_SIZE; col++) {
                    if (board[row][col] !== 0) {
                        let currentCol = col;
                        
                        while (currentCol > 0 && board[row][currentCol-1] === 0) {
                            // 向左移动方块
                            board[row][currentCol-1] = board[row][currentCol];
                            board[row][currentCol] = 0;
                            currentCol--;
                            moved = true;
                        }
                        
                        // 检查是否可以合并
                        if (currentCol > 0 && board[row][currentCol-1] === board[row][currentCol]) {
                            // 合并方块
                            board[row][currentCol-1] *= 2;
                            board[row][currentCol] = 0;
                            score += board[row][currentCol-1];
                            moved = true;
                        }
                    }
                }
            }
            
            return moved;
        }
        
        // 向右移动
        function moveRight() {
            let moved = false;
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                // 处理合并
                for (let col = BOARD_SIZE - 2; col >= 0; col--) {
                    if (board[row][col] !== 0) {
                        let currentCol = col;
                        
                        while (currentCol < BOARD_SIZE - 1 && board[row][currentCol+1] === 0) {
                            // 向右移动方块
                            board[row][currentCol+1] = board[row][currentCol];
                            board[row][currentCol] = 0;
                            currentCol++;
                            moved = true;
                        }
                        
                        // 检查是否可以合并
                        if (currentCol < BOARD_SIZE - 1 && board[row][currentCol+1] === board[row][currentCol]) {
                            // 合并方块
                            board[row][currentCol+1] *= 2;
                            board[row][currentCol] = 0;
                            score += board[row][currentCol+1];
                            moved = true;
                        }
                    }
                }
            }
            
            return moved;
        }
        
        // 更新分数显示
        function updateScore() {
            scoreDisplay.textContent = score;
            
            // 更新最高分
            if (score > bestScore) {
                bestScore = score;
                bestDisplay.textContent = bestScore;
                localStorage.setItem('2048-bestScore', bestScore);
            }
        }
        
        // 检查游戏状态（胜利或失败）
        function checkGameStatus() {
            // 检查是否获胜（有2048方块）
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === 2048) {
                        gameWon = true;
                        gameWonScreen.style.display = 'flex';
                        return;
                    }
                }
            }
            
            // 检查是否有空位置
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === 0) {
                        return; // 还有空位置，游戏继续
                    }
                }
            }
            
            // 检查是否还可以合并
            // 检查水平方向
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE - 1; col++) {
                    if (board[row][col] === board[row][col+1]) {
                        return; // 可以合并，游戏继续
                    }
                }
            }
            
            // 检查垂直方向
            for (let col = 0; col < BOARD_SIZE; col++) {
                for (let row = 0; row < BOARD_SIZE - 1; row++) {
                    if (board[row][col] === board[row+1][col]) {
                        return; // 可以合并，游戏继续
                    }
                }
            }
            
            // 没有空位置且不能合并，游戏结束
            gameOver = true;
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }
        
        // 事件监听器
        document.addEventListener('keydown', (e) => {
            // 阻止方向键滚动页面
            if ([37, 38, 39, 40].includes(e.keyCode)) {
                e.preventDefault();
            }
            
            switch(e.key) {
                case 'ArrowUp':
                    move('up');
                    break;
                case 'ArrowDown':
                    move('down');
                    break;
                case 'ArrowLeft':
                    move('left');
                    break;
                case 'ArrowRight':
                    move('right');
                    break;
            }
        });
        
        newGameBtn.addEventListener('click', initGame);
        undoBtn.addEventListener('click', undo);
        restartBtn.addEventListener('click', initGame);
        continueBtn.addEventListener('click', () => {
            gameWon = false;
            gameWonScreen.style.display = 'none';
        });
        
        // 触摸滑动支持（移动设备）
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchend', (e) => {
            if (gameOver || gameWon) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            // 确定滑动方向（阈值50px）
            if (Math.abs(dx) > Math.abs(dy)) {
                // 水平滑动
                if (Math.abs(dx) > 50) {
                    if (dx > 0) {
                        move('right');
                    } else {
                        move('left');
                    }
                }
            } else {
                // 垂直滑动
                if (Math.abs(dy) > 50) {
                    if (dy > 0) {
                        move('down');
                    } else {
                        move('up');
                    }
                }
            }
        });
        
        // 初始化游戏
        initGame();
    </script>
</body>
</html>
